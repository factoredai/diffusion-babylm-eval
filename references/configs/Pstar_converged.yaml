# ─────────────────────────────────────────────────────────────────────────────
# Pstar — Static "converged-mixture" control (the decisive ablation)
# ─────────────────────────────────────────────────────────────────────────────
# This is the single most informative experiment requested in the paper
# (Limitations (i) and Future Work #1): a STATIC mixture frozen at the
# allocation TAAM-v2 converged to, held fixed for the ENTIRE run.
#
# Why it matters
# --------------
# P1 only isolates the *initial* typological prior (a mild tilt, ~.32/.32/.36).
# It does NOT test the sharper reviewer question:
#
#     "Does online adaptation actually help, or does TAAM just end up giving
#      the model MORE Chinese — in which case a fixed high-Chinese mixture
#      would do just as well?"
#
# Pstar answers exactly this. It feeds the model the SAME total amount of each
# language that TAAM-v2 used on average, but as a CONSTANT mixture instead of a
# time-varying schedule. The comparison is therefore:
#
#     Pstar (fixed mixture)   vs.   TAAM-v2 (time-varying schedule)
#     ── same total Chinese, different *timing* ──
#
#   * If Pstar < TAAM-v2  → the gain is NOT "just more Chinese"; the *timing*
#                           matters → the optimal mixture is non-stationary
#                           (it changes during training). This is the strong,
#                           "discovery"-level result.
#   * If Pstar ≈ TAAM-v2  → a good fixed mixture suffices; adaptivity adds little.
#   * If Pstar > TAAM-v2  → it really was "just more Chinese" (report honestly).
#
# How pi was chosen
# -----------------
# pi = the TIME-AVERAGE of TAAM-v2's realized sampling distribution pi'(t),
# averaged over all 100 EXP3 eval steps of BOTH seeds (42 and 1337) and then
# renormalized. This is the actual token mixture v2 consumed across the run —
# more defensible than the single end-of-run endpoint:
#
#     seed42   time-avg : eng=0.1628 nld=0.2598 zho=0.5774
#     seed1337 time-avg : eng=0.1542 nld=0.2570 zho=0.5888
#     ---------------------------------------------------------
#     both-seed mean    : eng=0.1585 nld=0.2584 zho=0.5831   (used below)
#
#   (For reference, v2's end-of-run pi was ~ .157/.280/.563; the paper quotes
#    the rounded ~.15/.26/.57. The time-average above is the rigorous target.)
#
# Run it exactly like any other static condition, with the SAME 2 seeds as the
# rest of the matrix so the comparison stays clean:
#
#     python scripts/train.py --condition Pstar --seed 42 \
#         --token-data data/tokens \
#         --tokenizer tokenizer/spm_32k_en_nl_zh.model \
#         --total-steps 20000 --eval-every 200
#     python scripts/train.py --condition Pstar --seed 1337  (... same flags)
#
# Nothing else in the pipeline changes: method.type=static is already handled
# by scripts/train.py, and scripts/validate_configs.py auto-discovers this file.
# ─────────────────────────────────────────────────────────────────────────────
include: "base.yaml"

condition:
  id: "Pstar"
  name: "Static converged mixture (TAAM-v2 time-average)"
  description: |
    Static pi frozen at TAAM-v2's time-averaged converged allocation
    (eng=0.1585, nld=0.2584, zho=0.5831), held fixed for the entire run.
    Isolates "online adaptation / timing" from "simply more Chinese": Pstar and
    TAAM-v2 use the same total per-language budget, but Pstar keeps it constant
    while TAAM-v2 schedules it over time.
  method:
    type: "static"
    pi:
      eng: 0.158511
      nld: 0.258409
      zho: 0.583080
    online: null
