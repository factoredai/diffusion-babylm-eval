# ─────────────────────────────────────────────────────────────────────────────
# TAAM — Typology-Aware Adaptive Mixing (the proposed method)
# ─────────────────────────────────────────────────────────────────────────────
# Combines:
#   (a) URIEL-derived typological prior (pi_0; see configs/typological_prior.yaml)
#   (b) EXP3 online updates with normalized excess-loss reward
#   (c) Byte-premium-corrected accounting (logged but does NOT change pi)
#
# This is the single config that exercises all three components. Ablations:
#   - P1 = (a) only
#   - O1 = (b) only (uniform init)
#   - B1 = (c) only (uniform byte share)
#   - TAAM = (a) + (b) + (c)
# ─────────────────────────────────────────────────────────────────────────────
include: "base.yaml"

condition:
  id: "TAAM"
  name: "TAAM (typology prior + EXP3 + byte-premium)"
  description: |
    Online multilingual mixing with typology-initialized EXP3.
    - pi_0  ← URIEL prior (softmax(isolation/T), floor=0.10)
    - eta=0.10, gamma=0.10 (uniform mix-in), min_pi=0.05
    - reward = normalized excess loss (per-language EMA reference, /running std, clipped at ±2)
    - byte-premium accounting reported alongside token accounting
  method:
    type: "online"
    # pi_0 mirrors configs/typological_prior.yaml; loaded automatically at training time.
    pi_0:
      eng: 0.321292
      nld: 0.322712
      zho: 0.355996
    online:
      algorithm: "exp3"
      eta: 0.10
      gamma: 0.10
      min_pi: 0.05
      reward: "normalized_excess_loss"
      # How often we update pi. Mirrors base.yaml/online.eval_every_steps.
      update_every_steps: 200
