# P1 — Fixed typological prior (no online updates)
# Static pi initialized from URIEL/lang2vec typological isolation, held fixed
# for the entire run. This isolates the contribution of the typological prior
# from the EXP3 online adaptation (which TAAM adds on top).
#
# pi values come from configs/typological_prior.yaml (auto-generated by
# scripts/compute_typological_prior.py). Update this file by rerunning:
#
#     make prior
include: "base.yaml"

condition:
  id: "P1"
  name: "Typological prior (fixed)"
  description: |
    Static pi = pi_0_tokens from URIEL/lang2vec. Specifically, pi_0 is the
    softmax over per-language mean cosine distance (syntax+phonology+inventory),
    with floor 0.10 and temperature 0.5. Held fixed throughout training.
  method:
    type: "static"
    # Loaded from configs/typological_prior.yaml at training time.
    # The values below MIRROR that file (regenerate together) for human inspection.
    pi:
      eng: 0.321292
      nld: 0.322712
      zho: 0.355996
    online: null
