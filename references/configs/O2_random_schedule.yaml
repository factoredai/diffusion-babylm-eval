# O2 — Random fixed schedule (sanity baseline for adaptivity)
# A fixed pi sampled once at random from a Dirichlet(1, 1, 1) over the simplex.
# This tests whether ANY non-uniform allocation helps, or whether the SPECIFIC
# direction (typological / online-adapted) matters.
include: "base.yaml"

condition:
  id: "O2"
  name: "Random fixed schedule"
  description: |
    Static pi drawn once from Dirichlet(1, 1, 1) and held fixed.
    We commit to a SEED-FIXED draw to avoid p-hacking; the draw lives in
    method.pi below. Report results across 3 seeds (different draws would
    confound seed × pi variance).
  method:
    type: "static"
    # Drawn via numpy.random.default_rng(seed=3).dirichlet([10, 10, 10])
    # (first seed whose argmax != zho with max >= 0.40; see
    # scripts/compute_random_schedule.py for the deterministic recipe).
    # This intentionally points AWAY from the typology direction so the control
    # is informative.
    pi:
      eng: 0.474896
      nld: 0.299172
      zho: 0.225932
    online: null
