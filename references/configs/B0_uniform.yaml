# B0 — Uniform token-share baseline
# Fixed pi = (1/3, 1/3, 1/3) over tokens for the entire run.
# This is the "naive" baseline. It does NOT correct for byte premium.
include: "base.yaml"

condition:
  id: "B0"
  name: "Uniform (tokens)"
  description: |
    Static uniform sampling: each batch is drawn from pi = (1/3, 1/3, 1/3)
    regardless of byte premium or typological structure.
  method:
    type: "static"
    pi:
      eng: 0.333333
      nld: 0.333333
      zho: 0.333334
    online: null
