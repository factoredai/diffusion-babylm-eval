# O1 — EXP3 starting from uniform (no typological prior)
# Isolates the contribution of the EXP3 online adaptation from the
# typological prior (which TAAM adds on top).
include: "base.yaml"

condition:
  id: "O1"
  name: "EXP3 (uniform initialization)"
  description: |
    Online EXP3 mixing with uniform pi_0 = (1/3, 1/3, 1/3) and normalized
    excess-loss reward (taam.reward.NormalizedExcessLossReward). The bandit
    must "discover" the typological asymmetry purely from data.
  method:
    type: "online"
    pi_0:
      eng: 0.333333
      nld: 0.333333
      zho: 0.333334
    online:
      algorithm: "exp3"
      eta: 0.10
      gamma: 0.10
      min_pi: 0.05
      reward: "normalized_excess_loss"
